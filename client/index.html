<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-mmi.png" />
    <link rel="apple-touch-icon" href="/logo-mmi.png" />
    <meta name="theme-color" content="#ff7cb7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MMIvers" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMIvers</title>
    <script>
      const saved = localStorage.getItem('theme');
      const valid = ['mmi','dark','bleu','pastel','obsidian'];
      const t = valid.includes(saved) ? saved : 'mmi';
      document.documentElement.setAttribute('data-theme', t);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
